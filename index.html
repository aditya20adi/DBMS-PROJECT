<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced User Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding: 30px; background-color: #f8f9fa; }
        h1 { margin-bottom: 20px; }
        .user-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: #fff; margin-bottom: 10px; border-radius: 5px; }
        .btn-group button { margin-left: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>User Management</h1>
        
        <div class="mb-3">
            <input type="text" id="username" placeholder="Enter username" class="form-control mb-2">
            <input type="text" id="dept" placeholder="Enter department" class="form-control mb-2">
            <input type="number" id="salary" placeholder="Enter salary" class="form-control mb-2">
            <button id="addUser" class="btn btn-primary w-100">Add / Update User</button>
        </div>

        <ul id="userList" class="list-unstyled"></ul>
    </div>

    <script>
        let users = [
            {id: 101, name: "Amit", dept: "HR", salary: 30000},
            {id: 102, name: "Rahul", dept: "IT", salary: 45000},
            {id: 103, name: "Neha", dept: "IT", salary: 50000},
            {id: 104, name: "Pooja", dept: "HR", salary: 28000},
            {id: 105, name: "Rohan", dept: "SALES", salary: 40000},
            {id: 106, name: "Anjali", dept: "SALES", salary: 42000}
        ];

        let editingId = null;

        function renderUsers() {
            const userList = document.getElementById('userList');
            userList.innerHTML = '';

            users.forEach(user => {
                const li = document.createElement('li');
                li.className = 'user-item';
                li.innerHTML = `
                    <span>${user.id} - ${user.name} (${user.dept}) : $${user.salary}</span>
                    <div class="btn-group">
                        <button class="btn btn-sm btn-warning" onclick="editUser(${user.id})">Edit</button>
                        <button class="btn btn-sm btn-danger" onclick="deleteUser(${user.id})">Delete</button>
                    </div>
                `;
                userList.appendChild(li);
            });
        }

        function addOrUpdateUser() {
            const name = document.getElementById('username').value.trim();
            const dept = document.getElementById('dept').value.trim();
            const salary = parseInt(document.getElementById('salary').value);

            if (!name || !dept || isNaN(salary)) return alert("All fields are required!");

            if (editingId) {
                const user = users.find(u => u.id === editingId);
                user.name = name;
                user.dept = dept;
                user.salary = salary;
                editingId = null;
            } else {
                const id = users.length ? Math.max(...users.map(u => u.id)) + 1 : 101;
                users.push({id, name, dept, salary});
            }

            document.getElementById('username').value = '';
            document.getElementById('dept').value = '';
            document.getElementById('salary').value = '';
            renderUsers();
        }

        function editUser(id) {
            const user = users.find(u => u.id === id);
            document.getElementById('username').value = user.name;
            document.getElementById('dept').value = user.dept;
            document.getElementById('salary').value = user.salary;
            editingId = id;
        }

        function deleteUser(id) {
            if (confirm("Are you sure you want to delete this user?")) {
                users = users.filter(u => u.id !== id);
                renderUsers();
            }
        }

        document.getElementById('addUser').addEventListener('click', addOrUpdateUser);
        renderUsers();
    </script>
</body>
</html>
